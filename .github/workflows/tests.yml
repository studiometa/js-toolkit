name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  code-quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run code quality tests
        run: npm run lint:oxlint
      - name: Run types tests
        run: npm run lint:types

  unit:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - package: js-toolkit
            working-directory: .
            test-command: npm run test -- -- --retry=3 --coverage.enabled
            coverage-file: ./packages/coverage/clover.xml
          - package: oxlint-plugin-js-toolkit
            working-directory: packages/oxlint-plugin-js-toolkit
            test-command: npm test -- --retry=3 --coverage.enabled
            coverage-file: packages/oxlint-plugin-js-toolkit/coverage/clover.xml
    name: unit (${{ matrix.package }})
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: ${{ matrix.test-command }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.coverage-file }}
          flags: ${{ matrix.package }}
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
