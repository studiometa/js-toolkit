<div data-component="Counter" class="inline-flex items-center gap-6">
  <button
    class="w-12 h-12 rounded bg-gray-300/50 dark:bg-gray-600/50 hover:bg-gray-400/50 dark:hover:bg-gray-500/50 transition border-0"
    data-ref="remove">
    -
  </button>
  <div class="w-6 text-center" data-ref="counter">0</div>
  <button
    class="w-12 h-12 rounded bg-gray-300/50 dark:bg-gray-600/50 hover:bg-gray-400/50 dark:hover:bg-gray-500/50 transition border-0"
    data-ref="add">
    +
  </button>
</div>
